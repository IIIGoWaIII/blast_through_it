<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fast_text_reader</title>
    <style>
      #loading-bar-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: #18181b;
        z-index: 9999;
      }
      #loading-bar {
        height: 100%;
        width: 0%;
        background: #dc2626;
        transition: width 0.2s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="loading-bar-container">
      <div id="loading-bar"></div>
    </div>
    <div id="root"></div>
    <script>
      (function() {
        var bar = document.getElementById('loading-bar');
        var container = document.getElementById('loading-bar-container');

        var expectedResources = [];
        var loadedResources = {};
        var checkComplete = false;

        function getResources() {
          var entries = performance.getEntriesByType('resource');
          var jsFiles = [];
          for (var i = 0; i < entries.length; i++) {
            var entry = entries[i];
            if (entry.name.indexOf('.js') !== -1 || entry.name.indexOf('.css') !== -1) {
              if (!loadedResources[entry.name]) {
                jsFiles.push(entry.name);
              }
            }
          }
          return jsFiles;
        }

        function updateBar() {
          var entries = performance.getEntriesByType('resource');
          var totalSize = 0;
          var loadedSize = 0;
          for (var i = 0; i < entries.length; i++) {
            var entry = entries[i];
            if (entry.name.indexOf('.js') !== -1 || entry.name.indexOf('.css') !== -1) {
              totalSize += entry.transferSize || entry.decodedBodySize || 0;
              if (entry.duration > 0) {
                loadedSize += entry.transferSize || entry.decodedBodySize || 0;
              }
            }
          }
          if (checkComplete) {
            var existing = performance.getEntriesByType('navigation');
            if (existing.length > 0 && existing[0].loadEventEnd > 0) {
              bar.style.width = '100%';
              setTimeout(function() {
                container.style.opacity = '0';
                container.style.transition = 'opacity 0.3s ease-out';
                setTimeout(function() { container.remove(); }, 300);
              }, 100);
              return;
            }
          }
          if (totalSize > 0) {
            var pct = Math.min((loadedSize / totalSize) * 90, 90);
            bar.style.width = pct + '%';
          }
        }

        function tick() {
          updateBar();
          if (!checkComplete) {
            requestAnimationFrame(tick);
          }
        }

        requestAnimationFrame(tick);

        window.addEventListener('load', function() {
          checkComplete = true;
          setTimeout(function() {
            updateBar();
            setTimeout(function() {
              bar.style.width = '100%';
              setTimeout(function() {
                container.style.opacity = '0';
                container.style.transition = 'opacity 0.3s ease-out';
                setTimeout(function() { container.remove(); }, 300);
              }, 200);
            }, 100);
          }, 300);
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
