<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fast_text_reader</title>
    <style>
      #loading-bar-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #18181b;
        z-index: 9999;
        gap: 16px;
      }
      #loading-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: #a1a1aa;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      #loading-bar-track {
        width: 100%;
        max-width: 280px;
        height: 6px;
        background: #27272a;
        border: 1px solid #3f3f46;
        border-radius: 4px;
        padding: 2px;
        box-sizing: border-box;
      }
      #loading-bar {
        height: 100%;
        width: 5%;
        background: #dc2626;
        border-radius: 2px;
        transition: width 0.15s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="loading-bar-container">
      <div id="loading-text">Loading...</div>
      <div id="loading-bar-track">
        <div id="loading-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function() {
        var bar = document.getElementById('loading-bar');
        var container = document.getElementById('loading-bar-container');
        var loadingText = document.getElementById('loading-text');

        var checkComplete = false;
        var hasRealData = false;
        var fallbackMode = false;
        var fallbackProgress = 5;

        function updateBar() {
          if (fallbackMode) {
            fallbackProgress = Math.min(fallbackProgress + 1.5, 90);
            bar.style.width = fallbackProgress + '%';
            return;
          }

          var entries = performance.getEntriesByType('resource');
          var totalSize = 0;
          var loadedSize = 0;
          for (var i = 0; i < entries.length; i++) {
            var entry = entries[i];
            if (entry.name.indexOf('.js') !== -1 || entry.name.indexOf('.css') !== -1) {
              totalSize += entry.transferSize || entry.decodedBodySize || 0;
              if (entry.duration > 0) {
                loadedSize += entry.transferSize || entry.decodedBodySize || 0;
              }
            }
          }

          if (totalSize > 0) {
            hasRealData = true;
            var pct = Math.min((loadedSize / totalSize) * 90, 90);
            bar.style.width = pct + '%';
          }

          if (checkComplete) {
            var existing = performance.getEntriesByType('navigation');
            if (existing.length > 0 && existing[0].loadEventEnd > 0) {
              bar.style.width = '100%';
              loadingText.textContent = 'Ready';
              setTimeout(function() {
                container.style.opacity = '0';
                container.style.transition = 'opacity 0.3s ease-out';
                setTimeout(function() { container.remove(); }, 300);
              }, 100);
              return;
            }
          }
        }

        function tick() {
          updateBar();
          if (!checkComplete) {
            requestAnimationFrame(tick);
          }
        }

        requestAnimationFrame(tick);

        setTimeout(function() {
          if (!hasRealData) {
            fallbackMode = true;
          }
        }, 500);

        window.addEventListener('load', function() {
          checkComplete = true;
          setTimeout(function() {
            updateBar();
            setTimeout(function() {
              bar.style.width = '100%';
              loadingText.textContent = 'Ready';
              setTimeout(function() {
                container.style.opacity = '0';
                container.style.transition = 'opacity 0.3s ease-out';
                setTimeout(function() { container.remove(); }, 300);
              }, 1000);
            }, 100);
          }, 300);
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
